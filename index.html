<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors - C++ in Browser</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

<div class="text-center space-y-8">

  <h1 class="text-4xl font-bold">Rock Paper Scissors</h1>
  <p class="text-gray-400">Powered by C++ running in your browser</p>

  <div class="flex gap-6 justify-center">

    <button onclick="playGame(0)"
      class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg text-lg font-semibold transition">
      🪨 Rock
    </button>

    <button onclick="playGame(1)"
      class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-lg text-lg font-semibold transition">
      📄 Paper
    </button>

    <button onclick="playGame(2)"
      class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-lg text-lg font-semibold transition">
      ✂️ Scissors
    </button>

  </div>

  <div class="mt-8">
    <h2 id="result" class="text-2xl font-bold text-yellow-400"></h2>
  </div>

</div>

<script src="game.js"></script>

<script>

function playGame(choice){

  const result = Module.ccall(
    "play",
    "number",
    ["number"],
    [choice]
  );

  let text="";

  if(result==1) text="🎉 You Win!";
  else if(result==0) text="🤝 Draw!";
  else text="💀 You Lose!";

  document.getElementById("result").innerText=text;
}

</script>

</body>
</html>
